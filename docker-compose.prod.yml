# Production-ready stack: Caddy + Next.js + BullMQ worker + PgBouncer + Postgres + Redis.
#
# Brings up the v1 minimum for a single-host deployment (Hetzner / Fly.io /
# DigitalOcean). For multi-host or k8s, lift the same images into your
# orchestrator and keep the env-var contract.
#
# Bring up:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env (in `.env.prod` next to this file, NEVER committed):
#   APP_HOST=raid.example.com
#   POSTGRES_PASSWORD=<strong>
#   ...see .env.example for the full list
#
# TLS: Caddy auto-acquires certs from Let's Encrypt for APP_HOST. Set
# APP_HOST=localhost during the first smoke test to skip the public-DNS
# requirement (Caddy will issue a self-signed cert).

services:
  caddy:
    image: caddy:2-alpine
    container_name: rts-caddy
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - rts-caddy-data:/data
      - rts-caddy-config:/config
    environment:
      APP_HOST: ${APP_HOST}
    depends_on:
      web:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: raid-team-stats:prod
    container_name: rts-web-prod
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD}@pgbouncer:6432/raid_team_stats?schema=public
      # The entrypoint runs migrations on start (the web container is the single
      # place they run). Migrations need a DIRECT Postgres connection — a
      # transaction-pooled PgBouncer can't run Prisma's migration session.
      RUN_MIGRATIONS: "true"
      MIGRATE_DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD}@postgres:5432/raid_team_stats?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      RATE_LIMIT_TRUST_PROXY: "true"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 3s
      start_period: 30s
      retries: 4

  # NOTE: the public recruitment form (/apply/<guildId>/<slug>) is served by the
  # main `web` container at a PATH on {$APP_HOST} — no separate container or
  # apply.* subdomain (no extra Cloudflare DNS record / cert needed).

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: raid-team-stats:prod
    container_name: rts-worker-prod
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      # The web container owns migrations; the worker must NOT also run them.
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD}@pgbouncer:6432/raid_team_stats?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    # Run the worker straight from TypeScript via tsx (shipped in the image),
    # the same way it runs in development.
    command: ["node_modules/.bin/tsx", "src/server/ingestion/worker.ts"]
    # The shared image bakes a HEALTHCHECK that curls /api/health (correct for
    # web). The worker serves no HTTP, so that check always fails and the
    # container is reported "unhealthy" though it is running fine. Disable it.
    healthcheck:
      disable: true
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: rts-postgres-prod
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, DAC_OVERRIDE, FOWNER]
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_USER: raid_team_stats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: raid_team_stats
    volumes:
      - rts-pgdata-prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raid_team_stats -d raid_team_stats"]
      interval: 10s
      timeout: 3s
      retries: 12

  pgbouncer:
    image: edoburu/pgbouncer:1.23.0
    container_name: rts-pgbouncer
    restart: unless-stopped
    # no-new-privileges is always safe; full cap-drop for this image should be
    # smoke-tested on the host before adding (it drops to a non-root user).
    security_opt: ["no-new-privileges:true"]
    environment:
      DB_USER: raid_team_stats
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: raid_team_stats
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
      # MUST listen on 6432 — web/worker DATABASE_URL and the healthcheck below
      # both target pgbouncer:6432. The edoburu image defaults LISTEN_PORT to
      # 5432, which silently breaks both (dependency never goes healthy).
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # busybox `nc -z` (this image) does not behave like OpenBSD nc and reports
      # an open port as closed, so the dependency never goes healthy. pg_isready
      # is purpose-built and confirmed to report pgbouncer on 6432 as up.
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432", "-U", "raid_team_stats"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: rts-redis-prod
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, DAC_OVERRIDE]
    security_opt: ["no-new-privileges:true"]
    command:
      - redis-server
      # Authenticate every client. REDIS_PASSWORD MUST be set in .env.prod
      # (fail-closed). Redis caches service API tokens + job payloads and
      # persists them via AOF/RDB, so an unauthenticated Redis is a real leak.
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env.prod}
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
      - --save
      - "60"
      - "1000"
    volumes:
      - rts-redisdata-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backup:
    # Optional: nightly pg_dump → age-encrypted blob → off-host object store.
    # Configure BACKUP_AGE_PUBKEY and RCLONE_REMOTE in .env.prod, then enable
    # this service. See scripts/backup.sh for the actual command.
    image: alpine:3.20
    container_name: rts-backup
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    profiles:
      - backup
    env_file:
      - .env.prod
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - rts-backup-staging:/var/backup
    entrypoint: ["sh", "-c"]
    command:
      - >
        apk add --no-cache postgresql16-client age rclone curl coreutils;
        echo "0 4 * * * /usr/local/bin/backup.sh" | crontab -;
        crond -f -l 2

volumes:
  rts-pgdata-prod:
  rts-redisdata-prod:
  rts-caddy-data:
  rts-caddy-config:
  rts-backup-staging:
