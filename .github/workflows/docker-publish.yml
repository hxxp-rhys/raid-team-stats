name: Publish Docker image

# Builds the production Dockerfile and publishes the image to GitHub Container
# Registry (ghcr.io) — and, if you add the two Docker Hub secrets below, to
# Docker Hub as well.
#
#   ghcr.io/<owner>/raid-stats:latest        (always — uses GITHUB_TOKEN)
#   docker.io/<DOCKERHUB_USERNAME>/raid-stats:latest   (only if secrets are set)
#
# To ALSO publish to Docker Hub, add two repository secrets
# (Settings -> Secrets and variables -> Actions):
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — a Docker Hub access token (Account Settings -> Security)
# Leave them unset to publish to GHCR only; the Docker Hub steps self-skip.
#
# After the FIRST successful run, make the GHCR package public so anyone can
# pull without auth: repo -> Packages -> raid-stats -> Package settings ->
# Change visibility -> Public.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write # required to push to ghcr.io with GITHUB_TOKEN

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  # Mirrors the secret into the env context so step `if:` and metadata `enable=`
  # can gate the Docker Hub publish on whether it's configured.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Registers binfmt handlers so multi-arch builds are a one-line change
      # (add linux/arm64 to `platforms` below). Harmless for amd64-only.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry (ghcr.io)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image names + tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          # NOTE: the repo was renamed to raid-team-stats, but the GHCR image is
          # intentionally pinned to ghcr.io/hxxp-rhys/raid-stats (NOT
          # github.repository). That package is already public + linked to this
          # repo and is exactly what the prod compose pulls; pinning avoids a
          # private-package migration + a prod image switch. The image name is
          # internal infra (not user-visible) and matches the hardcoded Docker
          # Hub name below.
          images: |
            ghcr.io/hxxp-rhys/raid-stats
            name=docker.io/${{ env.DOCKERHUB_USERNAME }}/raid-stats,enable=${{ env.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          # amd64 covers virtually all servers/VPS. To also serve Apple Silicon
          # / ARM hosts, change to: linux/amd64,linux/arm64 (slower — arm64
          # builds run under QEMU emulation).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
