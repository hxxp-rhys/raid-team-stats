name: Trivy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC. Catches new CVEs against old commits without
    # waiting for a PR.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  security-events: write

# Trivy runs as an informational gate: never fails the build, always
# uploads a SARIF artifact, and (where the org enables GitHub Advanced
# Security) also pushes the SARIF to the Security tab. Accepted upstream
# advisories live in SECURITY.md and .trivyignore.
jobs:
  fs-scan:
    name: Trivy — repository (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          trivyignores: .trivyignore
          skip-dirs: ".github,docs,tests,node_modules/next/dist/docs"

      - name: Upload SARIF (filesystem)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-fs-sarif
          path: trivy-fs.sarif
          if-no-files-found: ignore

  image-scan:
    name: Trivy — production image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build production image
        run: docker build -t rts-web:ci-scan -f Dockerfile .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true
        with:
          image-ref: rts-web:ci-scan
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
          trivyignores: .trivyignore

      - name: Upload SARIF (image)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload SARIF artifact (image)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-image-sarif
          path: trivy-image.sarif
          if-no-files-found: ignore
