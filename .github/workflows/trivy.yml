name: Trivy

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC. Catches new CVEs against old commits without
    # waiting for a PR.
    - cron: "0 5 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  fs-scan:
    name: Trivy — repository (filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          # CRITICAL+HIGH fail the build. MEDIUM is reported in the SARIF
          # but does not block merges — too noisy.
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
          # Skip directories that aren't shipped to runtime.
          skip-dirs: ".github,docs,tests,node_modules/next/dist/docs"

      - name: Upload SARIF (filesystem)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  image-scan:
    name: Trivy — production image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t rts-web:ci-scan -f Dockerfile .

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: rts-web:ci-scan
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif

      - name: Upload SARIF (image)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
