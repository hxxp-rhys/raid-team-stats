name: Build + publish companion installer

# Builds the Windows MSI (installer/build.ps1) on a Windows runner and attaches
# it to the GitHub Release for the pushed tag. The app's /uploader/installer
# route redirects everyone to
#   https://github.com/<owner>/<repo>/releases/latest/download/raid-team-stats-uploader.msi
# so the ~28 MB installer is hosted ONCE (centrally) and NO self-hoster ships it.
#
# Cut a release:
#   1. bump installer/Package.wxs  Version="x.y.z.0"
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
# workflow_dispatch builds the MSI as a smoke test WITHOUT publishing.
#
# IMPORTANT: GitHub Release assets are anonymously downloadable only when the
# repo is PUBLIC — required for the /uploader/installer redirect to work for
# everyone's visitors. Set RTS_SIGN_* repo secrets to ship a SIGNED installer
# (removes the SmartScreen "unknown publisher" warning); unsigned otherwise.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write # create / upload GitHub Releases

concurrency:
  group: installer-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Install WiX v6 + UI extension
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 6.0.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          wix extension add -g WixToolset.UI.wixext/6.0.0

      - name: Build MSI (installer/build.ps1)
        shell: pwsh
        env:
          # Optional Authenticode signing — set these repo secrets to ship a
          # SIGNED installer (Settings -> Secrets and variables -> Actions).
          # Without them the build still succeeds; the installer is unsigned.
          RTS_SIGN_THUMBPRINT: ${{ secrets.RTS_SIGN_THUMBPRINT }}
          RTS_SIGN_PFX: ${{ secrets.RTS_SIGN_PFX }}
          RTS_SIGN_PFX_PW: ${{ secrets.RTS_SIGN_PFX_PW }}
          RTS_SIGN_TS: ${{ secrets.RTS_SIGN_TS }}
        run: pwsh installer/build.ps1

      - name: Verify artifact
        shell: pwsh
        run: |
          if (-not (Test-Path installer/dist/raid-team-stats-uploader.msi)) {
            throw "build.ps1 did not produce installer/dist/raid-team-stats-uploader.msi"
          }

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $msi = "installer/dist/raid-team-stats-uploader.msi"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $msi --clobber
          } else {
            gh release create $tag $msi --title $tag --generate-notes
          }
