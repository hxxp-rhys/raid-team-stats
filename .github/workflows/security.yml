name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly Monday 04:00 UTC — picks up new public ZAP rules without waiting
    # for a PR.
    - cron: "0 4 * * 1"

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://raid_team_stats:ci_password@localhost:5432/raid_team_stats?schema=public

      - name: Boot dev stack (postgres, redis)
        run: docker compose up -d postgres redis

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            docker exec rts-postgres pg_isready -U raid_team_stats -d raid_team_stats && break
            sleep 2
          done

      - name: Build app
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          SKIP_ENV_VALIDATION: "1"

      - name: Start app
        run: |
          npm run start &
          for i in {1..30}; do
            curl -fsS http://localhost:3000/api/health && break
            sleep 2
          done
        env:
          NODE_ENV: production
          APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://raid_team_stats:dev_password_change_me@localhost:5432/raid_team_stats?schema=public
          REDIS_URL: redis://localhost:6379
          AUTH_SECRET: Y2ktb25seS1hdXRoLXNlY3JldC1ub3QtZm9yLXByb2R1Y3Rpb24tdXNlLTEyMzQ1
          TOKEN_ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS0zMmJ5dGVzLWFhYWE=
          BLIZZARD_CLIENT_ID: ci-noop
          BLIZZARD_CLIENT_SECRET: ci-noop
          BLIZZARD_REGION: us
          BATTLENET_REDIRECT_URI: http://localhost:3000/bnet-login-callback
          WCL_CLIENT_ID: ci-noop
          WCL_CLIENT_SECRET: ci-noop
          WCL_HOURLY_POINTS_BUDGET: 17000
          WCL_REDIRECT_URI: http://localhost:3000/wcl-callback
          SMTP_HOST: example.invalid
          SMTP_PORT: 587
          SMTP_USER: ci@example.invalid
          SMTP_PASSWORD: ci-noop
          SMTP_FROM: ci@example.invalid
          RATE_LIMIT_TRUST_PROXY: "false"
          NEXT_PUBLIC_APP_NAME: Raid Team Stats

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          # Fail the workflow only on WARN+ findings the upstream rules consider
          # high-confidence. Tune via .zap/rules.tsv if false positives appear.
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json
          if-no-files-found: ignore

      - name: Stop docker compose
        if: always()
        run: docker compose down -v

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: raid_team_stats
          POSTGRES_PASSWORD: dev_password_change_me
          POSTGRES_DB: raid_team_stats
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raid_team_stats -d raid_team_stats"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
