global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 60s

scrape_configs:
  - job_name: raid-team-stats-web
    metrics_path: /api/metrics
    scheme: http
    static_configs:
      - targets:
          - web:3000
    authorization:
      type: Bearer
      # METRICS_TOKEN_FROM_ENV is replaced by the Prometheus entrypoint at
      # container start via envsubst — see ops/prometheus/entrypoint.sh.
      credentials: METRICS_TOKEN_FROM_ENV

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100
