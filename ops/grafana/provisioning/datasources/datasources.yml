apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    # Explicit, STABLE uid: dashboards reference datasources BY uid. Without
    # this, Grafana assigns a random uid on first provision and every panel
    # fails to resolve its datasource — the "no data everywhere" symptom.
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 5000
