# Promtail tails the Docker daemon log socket and ships container logs to
# Loki with one stream per container. Labels keep cardinality bounded —
# we extract container_name + image, NOT per-container-id which would
# explode on each restart.

server:
  http_listen_port: 9080
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        target_label: container
        regex: /(.+)
        replacement: $1
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: service
    pipeline_stages:
      - cri: {}
      - match:
          # Caddy emits structured JSON (stack=access in its log directive);
          # parse it so the access-log fields (uri, status, host, etc.) get
          # promoted to log labels searchable in Grafana.
          selector: '{container="rts-caddy"}'
          stages:
            - json:
                expressions:
                  ts: ts
                  level: level
                  status: status
                  method: request.method
                  uri: request.uri
                  host: request.host
                  remote_ip: request.remote_ip
                  duration: duration
            - labels:
                level:
                status:
