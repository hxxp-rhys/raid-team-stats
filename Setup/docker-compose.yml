# ═══════════════════════════════════════════════════════════════════════════
#  raid-team-stats — PRODUCTION stack (pull-and-run)
# ═══════════════════════════════════════════════════════════════════════════
#
#  You should NOT need to edit this file. Every per-deployment value comes from
#  the .env file beside it. The whole deploy is three commands:
#
#      cp .env.example .env      # then edit .env (and run ./generate-secrets.sh)
#      ./init-storage.sh         # create the data dirs with correct permissions
#      docker compose up -d      # pulls the image, runs DB migrations, starts up
#
#  Monitoring (Prometheus + Loki + Promtail + Grafana) is ON by default.
#  To turn it OFF, set  COMPOSE_PROFILES=  (empty) in .env.
#  To also enable nightly encrypted backups, set  COMPOSE_PROFILES=monitoring,backup
#
#  See README.md in this folder for the full step-by-step guide.
# ═══════════════════════════════════════════════════════════════════════════

name: raid-team-stats

services:
  # ── Reverse proxy + automatic HTTPS (Let's Encrypt) ───────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: rts-caddy
    restart: unless-stopped
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_DIR:-./data}/caddy:/data
      - ${DATA_DIR:-./data}/caddy-config:/config
    environment:
      APP_HOST: ${APP_HOST:?APP_HOST is required — set it in .env}
    depends_on:
      web:
        condition: service_healthy

  # ── Next.js app (also runs DB migrations on boot) ─────────────────────────
  web:
    image: ${RTS_IMAGE:-ghcr.io/hxxp-rhys/raid-stats:latest}
    container_name: rts-web
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Fail closed at `up` if these public-URL values are blank (the app would
      # otherwise silently fall back to a localhost origin and break OAuth).
      APP_URL: ${APP_URL:?APP_URL is required — set it in .env}
      AUTH_URL: ${AUTH_URL:?AUTH_URL is required — set it in .env (same as APP_URL)}
      # The connection strings are assembled here from POSTGRES_PASSWORD /
      # REDIS_PASSWORD so you never write a full URL in .env. The host/user/db
      # names are internal compose wiring — do not change them.
      DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}@pgbouncer:6432/raid_team_stats?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}@redis:6379
      # The web container is the single place migrations run. They need a DIRECT
      # Postgres connection (PgBouncer's transaction pool can't run them).
      RUN_MIGRATIONS: "true"
      MIGRATE_DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD}@postgres:5432/raid_team_stats?schema=public
      RATE_LIMIT_TRUST_PROXY: "true"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 3s
      start_period: 40s
      retries: 5

  # ── Background ingestion worker (same image, different command) ───────────
  worker:
    image: ${RTS_IMAGE:-ghcr.io/hxxp-rhys/raid-stats:latest}
    container_name: rts-worker
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # The web container owns migrations; the worker must NOT also run them.
      RUN_MIGRATIONS: "false"
      DATABASE_URL: postgresql://raid_team_stats:${POSTGRES_PASSWORD}@pgbouncer:6432/raid_team_stats?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    command: ["node_modules/.bin/tsx", "src/server/ingestion/worker.ts"]
    depends_on:
      # Wait for web (which applies migrations) to be healthy before starting.
      web:
        condition: service_healthy

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rts-postgres
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, DAC_OVERRIDE, FOWNER]
    security_opt: ["no-new-privileges:true"]
    environment:
      POSTGRES_USER: raid_team_stats
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — set it in .env}
      POSTGRES_DB: raid_team_stats
    volumes:
      - ${DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raid_team_stats -d raid_team_stats"]
      interval: 10s
      timeout: 3s
      retries: 12

  # ── PgBouncer (transaction pooler in front of Postgres) ───────────────────
  pgbouncer:
    image: edoburu/pgbouncer:v1.23.0-p1
    container_name: rts-pgbouncer
    restart: unless-stopped
    security_opt: ["no-new-privileges:true"]
    environment:
      DB_USER: raid_team_stats
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_NAME: raid_team_stats
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "500"
      DEFAULT_POOL_SIZE: "20"
      AUTH_TYPE: scram-sha-256
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 6432"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Redis (cache + BullMQ queue; authenticated, AOF-persisted) ────────────
  redis:
    image: redis:7-alpine
    container_name: rts-redis
    restart: unless-stopped
    cap_drop: [ALL]
    cap_add: [SETUID, SETGID, CHOWN, DAC_OVERRIDE]
    security_opt: ["no-new-privileges:true"]
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD is required — set it in .env}
      - --appendonly
      - "yes"
      - --maxmemory-policy
      - noeviction
      - --save
      - "60"
      - "1000"
    volumes:
      - ${DATA_DIR:-./data}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ═════════════════════════════════════════════════════════════════════════
  #  MONITORING — ON by default. Opt out with COMPOSE_PROFILES= (empty) in .env.
  #  All UIs bind to 127.0.0.1 only; reach Grafana via an SSH tunnel
  #  (ssh -L 3001:localhost:3001 you@server  →  http://localhost:3001).
  # ═════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: rts-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    user: "65534:65534"
    environment:
      # Baked into the scrape config at START (via entrypoint.sh). After changing
      # METRICS_TOKEN you must RECREATE this container (docker compose up -d
      # prometheus), not just restart it.
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN is required — run ./generate-secrets.sh}
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ${DATA_DIR:-./data}/prometheus:/prometheus
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      web:
        condition: service_started

  loki:
    image: grafana/loki:3.2.0
    container_name: rts-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    # Pin Loki's default uid so it matches the ownership init-storage.sh sets.
    user: "10001:10001"
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - ${DATA_DIR:-./data}/loki:/loki
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.2.0
    container_name: rts-promtail
    restart: unless-stopped
    profiles: ["monitoring"]
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${DATA_DIR:-./data}/promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rts-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    # Pin Grafana's default uid so it matches the ownership init-storage.sh sets.
    user: "472:472"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      # No fail-closed guard here so opting OUT of monitoring never forces you to
      # set it. generate-secrets.sh fills this in; set a strong value if you
      # run monitoring. Grafana is localhost-only (SSH tunnel to reach it).
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-before-exposing}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ${DATA_DIR:-./data}/grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  # ═════════════════════════════════════════════════════════════════════════
  #  BACKUPS — OFF by default. Enable with COMPOSE_PROFILES=monitoring,backup
  #  in .env, and set BACKUP_AGE_PUBKEY + RCLONE_REMOTE. Runs nightly at 04:00.
  # ═════════════════════════════════════════════════════════════════════════
  backup:
    image: alpine:3.20
    container_name: rts-backup
    restart: unless-stopped
    profiles: ["backup"]
    security_opt: ["no-new-privileges:true"]
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_USER: raid_team_stats
      POSTGRES_DB: raid_team_stats
    volumes:
      - ./scripts/backup.sh:/usr/local/bin/backup.sh:ro
      - ${DATA_DIR:-./data}/backup-staging:/var/backup
    # NOTE: $$ escapes a literal $ so Compose passes the shell variables through
    # untouched (Compose interpolates single-$ values).
    entrypoint: ["sh", "-c"]
    command:
      - >
        i=0;
        until apk add --no-cache postgresql16-client age rclone curl coreutils; do
        i=$$((i+1)); [ $$i -ge 5 ] && echo "backup: apk add failed after 5 tries" >&2 && exit 1;
        echo "backup: apk add failed, retrying in 15s..."; sleep 15; done;
        echo "0 4 * * * sh /usr/local/bin/backup.sh" | crontab -;
        crond -f -l 2
