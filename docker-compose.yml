# Full-stack development compose. Brings up Postgres, Redis, and the Next.js
# web server in containers. The web service builds Dockerfile.dev and bind-
# mounts the project so file edits trigger Next dev's hot reload.
#
# Trade-off: Windows/WSL2 bind-mount file-watching is slower than native host
# `npm run dev`. If HMR feels sluggish, you can fall back to: comment out the
# `web` service, run `docker compose up postgres redis`, and start the app on
# the host with `npm run dev`. Either workflow uses the same .env.
#
# Production stack (Caddy + pgbouncer + worker + web + postgres + redis) lives
# in docker-compose.prod.yml, shipped in Phase 6.

services:
  postgres:
    image: postgres:16-alpine
    container_name: rts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raid_team_stats
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: raid_team_stats
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - rts-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raid_team_stats -d raid_team_stats"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: rts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - rts-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: raid-team-stats-web:dev
    container_name: rts-web
    restart: unless-stopped
    # .env supplies most variables; the entries below override the few that
    # must use service-DNS names instead of localhost when running inside the
    # compose network.
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://raid_team_stats:dev_password_change_me@postgres:5432/raid_team_stats?schema=public
      REDIS_URL: redis://redis:6379
      HOSTNAME: 0.0.0.0
      PORT: "3000"
      # Web + prometheus share the same default so /api/metrics is reachable
      # immediately after `docker compose up` without further config.
      METRICS_TOKEN: ${METRICS_TOKEN:-dev-metrics-token-change-me}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      # Bind-mount the project for live reload.
      - ./:/app
      # Named volumes shadow these paths so the container keeps its own copies
      # (Alpine-built native modules, generated Prisma client, Next dev cache)
      # rather than picking up host artifacts compiled for a different OS.
      - rts-node-modules:/app/node_modules
      - rts-next-cache:/app/.next
      - rts-prisma-client:/app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 3s
      start_period: 90s
      retries: 6

  # TLS terminator for local dev. Hits the same `web` service on 3000 but adds
  # an HTTPS entrypoint at https://localhost:8443 using the bind-mounted
  # Cloudflare Origin cert in ./certs/ (gitignored). The plain-HTTP web port
  # 3000 stays available for tooling that needs unencrypted hot reload.
  caddy:
    image: caddy:2-alpine
    container_name: rts-caddy
    restart: unless-stopped
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - rts-caddy-data:/data
      - rts-caddy-config:/config
    ports:
      - "127.0.0.1:8443:443"
    depends_on:
      web:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: raid-team-stats-web:dev
    container_name: rts-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://raid_team_stats:dev_password_change_me@postgres:5432/raid_team_stats?schema=public
      REDIS_URL: redis://redis:6379
      METRICS_TOKEN: ${METRICS_TOKEN:-dev-metrics-token-change-me}
    command: ["sh", "-c", "npx prisma generate && npx tsx src/server/ingestion/worker.ts"]
    volumes:
      - ./:/app
      - rts-node-modules:/app/node_modules
      - rts-prisma-client:/app/src/generated
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  # ── Observability ───────────────────────────────────────────────────────
  # prometheus + loki + promtail + grafana. Bound to localhost only on
  # dev; the prod compose puts Grafana behind Caddy basic auth.

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: rts-prometheus
    restart: unless-stopped
    user: "65534:65534"  # nobody
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:-dev-metrics-token-change-me}
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/prometheus/entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - rts-prometheus:/prometheus
    entrypoint: ["/bin/sh", "/etc/prometheus/entrypoint.sh"]
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      web:
        condition: service_started

  loki:
    image: grafana/loki:3.2.0
    container_name: rts-loki
    restart: unless-stopped
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./ops/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - rts-loki:/loki
    ports:
      - "127.0.0.1:3100:3100"

  promtail:
    image: grafana/promtail:3.2.0
    container_name: rts-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    volumes:
      - ./ops/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - rts-promtail-positions:/tmp
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.3.0
    container_name: rts-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - rts-grafana:/var/lib/grafana
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

volumes:
  rts-pgdata:
  rts-redisdata:
  rts-node-modules:
  rts-next-cache:
  rts-prisma-client:
  rts-prometheus:
  rts-loki:
  rts-promtail-positions:
  rts-grafana:
  rts-caddy-data:
  rts-caddy-config:
