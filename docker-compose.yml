# Development stack: Postgres + Redis only.
# Run the Next.js app on the host with `npm run dev` for fast HMR.

services:
  postgres:
    image: postgres:16-alpine
    container_name: rts-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raid_team_stats
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_DB: raid_team_stats
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - rts-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raid_team_stats -d raid_team_stats"]
      interval: 5s
      timeout: 3s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: rts-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - rts-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  rts-pgdata:
  rts-redisdata:
